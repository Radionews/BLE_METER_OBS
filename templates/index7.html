<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multimeter Display</title>
<style>
    @font-face {
        font-family: 'DSEG7';
        src: url('fonts/DSEG7Modern-BoldItalic.ttf') format('truetype');
        font-weight: normal;
        font-style: normal;
    }

    @font-face {
        font-family: 'DirectiveFour';
        src: url('fonts/DirectiveFour.ttf') format('truetype');
        font-weight: normal;
        font-style: normal;
    }

    body {
        margin: 0;
        padding: 0;
        background: transparent;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: 'DirectiveFour', 'Courier New', monospace;
    }
    .widget {
        width: 400px;
        height: 100px;
        background: #000;
        border-radius: 8px;
        display: flex;
        align-items: center;
        padding: 0 15px;
        box-sizing: border-box;
        position: relative;
        overflow: hidden;
    }

    .status-indicator {
        position: absolute;
        top: 8px;
        left: 10px;
        width: 24px;
        height: 10px;
        border-radius: 2px;
        background: red;
        transition: background 0.3s;
    }
    .status-indicator.connected {
        background: #0f0;
    }

    .value-container {
        flex: 1;
        text-align: right;
    }
    .main-value {
        color: #ffcc00;
        font-size: 60px;
        font-weight: bold;
        line-height: 1;
        font-family: 'DSEG7', 'Courier New', monospace;
        letter-spacing: 2px;
    }
    #valueDisplay {
        /* inline по умолчанию */
    }
    #unitDisplay {
        display: inline-block;
        text-align: right;
        font-size: 20px;
        width: 2ch;
        margin-left: 5px;
        font-family: 'DirectiveFour', 'Courier New', monospace;
    }

    .extra {
        display: flex;
        justify-content: space-between;  /* левый блок слева, правый справа */
        align-items: center;
        margin-top: 2px;
        font-size: 14px;
        font-family: 'DirectiveFour', 'Courier New', monospace;
        opacity: 0.7;
        color: #ffcc00;
    }
    .extra-right {
        display: flex;
        gap: 8px;
    }

    .status-cell {
        white-space: nowrap;
        text-align: center;
        visibility: hidden;
    }
    .status-cell.visible {
        visibility: visible;
    }

    /* Режим всегда виден, фиксированная ширина как у старого .mode */
    #modeCell {
        visibility: visible;
        min-width: 55px;
        text-align: left;
    }

    #batteryCell { min-width: 60px;}
    #autoCell    { min-width: 45px;}
    #relCell     { min-width: 35px;}
    #holdCell    { min-width: 40px;}

    /* Цвета для REL и HOLD */
    #relCell {
        color: #00ff00;
        opacity: 1;
    }
    #holdCell {
        color: #00bfff;
        opacity: 1;
    }
</style>
</head>
<body>
<div class="widget">
    <div class="status-indicator" id="statusIndicator"></div>
    <!-- mode убран отсюда -->
    <div class="value-container">
        <div class="main-value">
            <span id="valueDisplay">--</span><span id="unitDisplay"></span>
        </div>
        <div class="extra" id="extraDisplay">
            <!-- Режим слева -->
            <div class="status-cell" id="modeCell">---</div>
            <!-- Остальные индикаторы справа -->
            <div class="extra-right">
                <div class="status-cell" id="batteryCell"></div>
                <div class="status-cell" id="autoCell"></div>
                <div class="status-cell" id="relCell">REL</div>
                <div class="status-cell" id="holdCell">HOLD</div>
            </div>
        </div>
    </div>
</div>
<script>
    const API_URL = '/api/data';
    const statusIndicator = document.getElementById('statusIndicator');
    const modeCell = document.getElementById('modeCell');       // заменён modeDisplay
    const valueDisplay = document.getElementById('valueDisplay');
    const unitDisplay = document.getElementById('unitDisplay');
    const batteryCell = document.getElementById('batteryCell');
    const autoCell = document.getElementById('autoCell');
    const relCell = document.getElementById('relCell');
    const holdCell = document.getElementById('holdCell');

    function formatValue(value, isOL) {
        if (isOL) return "0L";
        if (value === null || value === undefined || isNaN(value)) return "----";
        let num = Number(value);
        let abs = Math.abs(num);
        if (abs === 0) return "0.000";
        if (abs >= 1000) return num.toFixed(0);
        if (abs >= 100) return num.toFixed(1);
        if (abs >= 10) return num.toFixed(2);
        if (abs >= 1) return num.toFixed(3);
        let precisionStr = num.toPrecision(4);
        if (precisionStr.includes('.')) {
            precisionStr = precisionStr.replace(/\.?0+$/, '');
            if (precisionStr.endsWith('.')) precisionStr = precisionStr.slice(0, -1);
        }
        return precisionStr;
    }

    function updateUI(data) {
        if (data.connected) {
            statusIndicator.classList.add('connected');
        } else {
            statusIndicator.classList.remove('connected');
        }

        // Режим всегда отображается
        modeCell.textContent = data.function || '---';

        const isOL = data.is_ol;
        const rawValue = data.value;
        valueDisplay.textContent = formatValue(rawValue, isOL);
        unitDisplay.textContent = data.connected ? (data.unit || '') : '';

        // Сброс видимости дополнительных индикаторов (кроме mode)
        batteryCell.classList.remove('visible');
        autoCell.classList.remove('visible');
        relCell.classList.remove('visible');
        holdCell.classList.remove('visible');

        if (!data.connected) return;

        if (data.battery > 0) {
            batteryCell.textContent = '🔋' + data.battery + '%';
            batteryCell.classList.add('visible');
        }
        if (data.is_auto !== undefined) {
            autoCell.textContent = data.is_auto ? 'AUTO' : 'MANUAL';
            autoCell.classList.add('visible');
        }
        if (data.is_rel) {
            relCell.classList.add('visible');
        }
        if (data.is_hold) {
            holdCell.classList.add('visible');
        }
    }

    async function fetchData() {
        try {
            const response = await fetch(API_URL);
            const data = await response.json();
            updateUI(data);
        } catch (err) {
            console.error('Ошибка опроса:', err);
            updateUI({ connected: false });
        }
    }

    setInterval(fetchData, 200);
    fetchData();
</script>
</body>
</html>
